<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Web App Penyelenggaraan Peralatan</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    margin:0;
    background:#f3f6f9;
    color:#333;
}

header{
    background:#0d6efd;
    color:white;
    padding:20px;
    text-align:center;
}

.badge{
    display:inline-block;
    margin-top:10px;
    padding:6px 12px;
    background:#ffc107;
    color:#222;
    border-radius:20px;
    font-size:14px;
    font-weight:bold;
}

.container{
    width:min(1200px,95%);
    margin:auto;
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 3px 8px rgba(0,0,0,.08);
}

.card h3{
    margin:0;
    color:#666;
}

.card .value{
    font-size:42px;
    font-weight:bold;
    color:#0d6efd;
    margin-top:10px;
}

.controls{
    margin:20px 0;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    background:#0d6efd;
    color:white;
}

button:hover{
    opacity:0.9;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    overflow:hidden;
    border-radius:10px;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

th{
    background:#0d6efd;
    color:white;
}

.attention{
    background:#ffd8d8;
}

.graph{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 3px 8px rgba(0,0,0,.08);
}

.bar-row{
    margin:18px 0;
}

.label{
    font-weight:bold;
    margin-bottom:5px;
}

.track{
    position:relative;
    height:24px;
    background:#e9ecef;
    border-radius:20px;
    overflow:hidden;
}

.bar-current{
    position:absolute;
    left:0;
    top:0;
    bottom:0;
    background:#0d6efd;
}

.limit-line{
    position:absolute;
    top:0;
    bottom:0;
    width:3px;
    background:red;
}

.info{
    margin-top:5px;
    font-size:13px;
    color:#555;
}

@media(max-width:700px){

table{
display:block;
overflow-x:auto;
}

.value{
font-size:34px;
}

}
</style>
</head>

<body>

<header>
<h1>Mini Web App Penyelenggaraan Peralatan</h1>
<div class="badge">Data Simulasi untuk Latihan Sahaja</div>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Jumlah Keseluruhan</h3>
<div class="value" id="total"></div>
</div>

<div class="card">
<h3>Jumlah Perlu Perhatian</h3>
<div class="value" id="attentionCount"></div>
</div>

</div>

<div class="controls">
<button onclick="paparSemua()">Semua Peralatan</button>
<button onclick="paparPerhatian()">Perlu Tindakan</button>
</div>

<table>

<thead>
<tr>
<th>Peralatan</th>
<th>Lokasi</th>
<th>Hari Sejak Servis</th>
<th>Had Servis</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="graph">
<h2>Graf Hari Sejak Servis vs Had Servis</h2>
<div id="graphArea"></div>
</div>

</div>

<script>

const data = [

{
peralatan:"Inkubator 01",
lokasi:"Makmal A",
hari:25,
had:30,
status:"Baik"
},

{
peralatan:"Inkubator 02",
lokasi:"Makmal A",
hari:48,
had:30,
status:"Perlu Servis"
},

{
peralatan:"Mikroskop 01",
lokasi:"Makmal B",
hari:12,
had:60,
status:"Baik"
},

{
peralatan:"Mikroskop 02",
lokasi:"Makmal B",
hari:68,
had:60,
status:"Perlu Servis"
},

{
peralatan:"Sentrifug 01",
lokasi:"Makmal A",
hari:20,
had:45,
status:"Baik"
},

{
peralatan:"Autoklaf 01",
lokasi:"Bilik Steril",
hari:52,
had:45,
status:"Perlu Servis"
},

{
peralatan:"Peti Sejuk 01",
lokasi:"Stor Reagen",
hari:15,
had:30,
status:"Baik"
},

{
peralatan:"Penimbang Digital",
lokasi:"Makmal C",
hari:75,
had:60,
status:"Rosak"
}

];

function perluPerhatian(item){

return item.hari > item.had ||
item.status==="Perlu Servis" ||
item.status==="Rosak";

}

function renderTable(list){

const body=document.getElementById("tableBody");

body.innerHTML="";

list.forEach(item=>{

const tr=document.createElement("tr");

if(perluPerhatian(item)){
tr.classList.add("attention");
}

tr.innerHTML=`

<td>${item.peralatan}</td>
<td>${item.lokasi}</td>
<td>${item.hari}</td>
<td>${item.had}</td>
<td>${item.status}</td>

`;

body.appendChild(tr);

});

}

function renderCards(){

document.getElementById("total").textContent=data.length;

const attention=data.filter(perluPerhatian).length;

document.getElementById("attentionCount").textContent=attention;

}

function renderGraph(){

const graph=document.getElementById("graphArea");

graph.innerHTML="";

const max=Math.max(...data.map(d=>Math.max(d.hari,d.had)));

data.forEach(item=>{

const row=document.createElement("div");

row.className="bar-row";

const currentWidth=(item.hari/max)*100;

const limitPos=(item.had/max)*100;

row.innerHTML=`

<div class="label">${item.peralatan}</div>

<div class="track">

<div class="bar-current"
style="width:${currentWidth}%"></div>

<div class="limit-line"
style="left:${limitPos}%"></div>

</div>

<div class="info">
Hari: ${item.hari} | Had: ${item.had} | Status: ${item.status}
</div>

`;

graph.appendChild(row);

});

}

function paparSemua(){

renderTable(data);

}

function paparPerhatian(){

renderTable(data.filter(perluPerhatian));

}

renderCards();
renderTable(data);
renderGraph();

</script>

</body>
</html>
